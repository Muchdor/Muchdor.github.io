<!DOCTYPE html>
<html>
<head>
	<title>Form Data Diri</title>

	<link rel="stylesheet" type="text/css" href="style_latihan 2.css">
</head>
<body>
	<div id="Daftar" class="First">
	<h1>Data Diri</h1>
	<form autocomplete="off" method="POST">

	<div id="Daftar" class="field">
		<input  type="Text" name="Username" placeholder="Username">
		<input type="Number" name="NIM" placeholder="NIM">
		<input type="Password" name="Password" placeholder="Password" required="required">
	</div>

	<div class="none">
		<label class="radio">
			<input type="Radio" name="Jenis_Kelamin" required="required">Laki-laki
			<span></span>
		</label>
		<label class="radio">
			<input type="Radio" name="Jenis_Kelamin" required="required">Perempuan
			<span></span>
		</label>
	</div>

	<div class="Submit">
		<label class="Check">
		<input type="Checkbox" name="setuju" required="required">Saya menyetujui persyaratan
		<span></span>
		</label>
	</div>
		<input type="Submit" value="Submit">	
		
	</form>
	</div>

	<div id="Login" class="First2">
	<h1>Login</h1>
	<form autocomplete="off" method="POST">

	<div class="field">
		<input  type="Text" name="Username" placeholder="Username">
		<input type="Password" name="Password" placeholder="Password" required="required">
	</div>
		<input type="Submit" value="Submit">	
		
	</form>
	</div>
</body>
</html>
